{"action":"update_status"|"add_task"|"extract_tasks"|"update_priority"|"update_due"|"update_effort"|"reply","message":"Japanese response","updates":[{"id":number,"field":"status"|"priority"|"due"|"title"|"effort","value":string}],"newTasks":[{"title":string,"detail":string,"source":string,"sourceIcon":"📧"|"💬"|"📹","priority":"高"|"中"|"低","status":"未着手","due":"YYYY-MM-DD","tags":[string],"effort":number}]}
Rules: 〇〇完了/終わった→status=完了, 〇〇着手→status=進行中, 追加：〇〇→add_task, Zoom/議事録→extract_tasks, 優先度を〇〇に→update_priority, 期限を〇〇に→update_due(4月10日→2026-04-10), 工数Nh→effort=N. タイトル部分一致. 返答は日本語.`;

  {id:2,title:"「紛争に関する勉強 番外編」Zoom参加",detail:"4/14(火) 14:00〜 坂上さん主催。藤村さんも参加予定。",source:"Gmail",sourceIcon:"📧",priority:"中",status:"未着手",due:"2026-04-14",tags:["勉強会","紛争"],effort:1},
  {id:3,title:"Global survey相談 フォローアップ",detail:"五井渕さんと3/27にMTG実施済み。次のアクション確認が必要。",source:"Gmail",sourceIcon:"📧",priority:"中",status:"進行中",due:"2026-04-05",tags:["調査","グローバル"],effort:2},
  {id:4,title:"ジャーナリスト情報提供件の方針確認",detail:"稲川さん・曽根原さんCc。警察庁との連携方針を組織として決定する必要あり。",source:"Gmail",sourceIcon:"📧",priority:"高",status:"進行中",due:"2026-04-02",tags:["対外連携","警察庁"],effort:2},
  {id:5,title:"AIチーム：業務実装方針レビュー＆フィードバック",detail:"小俣さんより依頼。AI最新情報キャッチアップ→業務実装検討。期日4/17。",source:"Slack #特命AIチーム",sourceIcon:"💬",priority:"高",status:"未着手",due:"2026-04-17",tags:["AI活用","組織"],effort:3},
  {id:6,title:"法人寄付・使途指定の提案内容フィードバック",detail:"青山さんより。横浜ゴム60万円寄付案件。各事業部パターンで提案作成中。",source:"Slack #組織横断ファンドレイジング",sourceIcon:"💬",priority:"高",status:"未着手",due:"2026-04-17",tags:["ファンドレイジング","寄付"],effort:2},
  {id:7,title:"HS参加者候補への声がけ協力",detail:"三代さんより。今週から主催団体各自で積極的な声がけ実施中。",source:"Slack #hs-global関連",sourceIcon:"💬",priority:"中",status:"未着手",due:"2026-04-03",tags:["HS","国際"],effort:1},
  {id:8,title:"英語発音レッスン受講（ストアカ）",detail:"3/29(日)21:00〜 井上陽子さん。3/30(月)20:00〜 別レッスン予約済み。",source:"Gmail",sourceIcon:"📧",priority:"低",status:"完了",due:"2026-03-30",tags:["英語","自己研鑽"],effort:1},
];
let gToken=null,sortBy="due",filter="全て",nextId=tasks.length+1,loading=false,tc=null,editId=null;
const SC={"未着手":"#3b82f6","進行中":"#f59e0b","完了":"#22c55e"};

window.addEventListener('load',()=>{
  if(window.google)ig();
  else document.querySelector('script[src*="gsi"]').addEventListener('load',ig);
  addMsg("assistant","こんにちは、恵介さん！\n\n「🔗 Googleログイン」でSheetsと接続できます。\n\nタスクカードにカーソルを当てると ✏️ 編集ボタンが出ます。優先度・タグ・工数を直接変更できます！");
  ra();

function ig(){tc=google.accounts.oauth2.initTokenClient({client_id:CID,scope:"https://www.googleapis.com/auth/spreadsheets",callback:async r=>{if(r.error){ss("⚠ エラー");addMsg("assistant","⚠️ ログイン失敗。もう一度お試しください。");return;}gToken=r.access_token;ss("✓ 接続済み");document.getElementById("login-btn").style.display="none";const sl=document.getElementById("sheets-link");sl.style.display="inline-block";sl.href=`https://docs.google.com/spreadsheets/d/${SID}`;await lfs();}});}
function connectSheets(){tc?.requestAccessToken();}
function ss(l){document.getElementById("slabel").textContent=l;}
async function lfs(){
  try{
    const r1=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${SN}!A1:J1`,{headers:{Authorization:`Bearer ${gToken}`}});
    const h=await r1.json();
    if(!h.values||h.values[0]?.[0]!=="id"){await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${SN}!A1:J1?valueInputOption=RAW`,{method:"PUT",headers:{Authorization:`Bearer ${gToken}`,"Content-Type":"application/json"},body:JSON.stringify({values:[HDR]})});}
    const r2=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${SN}!A2:J1000`,{headers:{Authorization:`Bearer ${gToken}`}});

    await sts(tasks);addMsg("assistant",`✅ Sheetsに${tasks.length}件を保存しました！`);
  }catch(e){ss("⚠ エラー");addMsg("assistant","⚠️ Sheets接続エラー: "+e.message);}
}
async function sts(tl){
  if(!gToken)return;ss("同期中...");
  try{
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${SN}!A2:J1000:clear`,{method:"POST",headers:{Authorization:`Bearer ${gToken}`}});
    if(!tl.length){ss("✓ 同期済み");return;}
    const rows=tl.map(t=>[t.id,t.title,t.detail||"",t.source||"",t.sourceIcon||"📋",t.priority||"中",t.status||"未着手",t.due||"",JSON.stringify(t.tags||[]),t.effort||0]);
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${SN}!A2:J${rows.length+1}?valueInputOption=RAW`,{method:"PUT",headers:{Authorization:`Bearer ${gToken}`,"Content-Type":"application/json"},body:JSON.stringify({values:rows})});
    ss("✓ 同期 "+new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}));
  }catch{ss("⚠ 同期エラー");}
}

function ra(){rt();re();uh();}
function uh(){
  const c={未着手:0,進行中:0,完了:0};tasks.forEach(t=>c[t.status]=(c[t.status]||0)+1);

  document.getElementById("c-wip").textContent=c["進行中"]||0;
  document.getElementById("c-done").textContent=c["完了"]||0;
  const rem=tasks.filter(t=>t.status!=="完了").reduce((s,t)=>s+(t.effort||0),0);
  const don=tasks.filter(t=>t.status==="完了").reduce((s,t)=>s+(t.effort||0),0);
  const tot=rem+don;
  document.getElementById("etotal").textContent=rem+"h残";
  document.getElementById("efill").style.width=tot>0?(don/tot*100)+"%":"0%";
}
function rt(){
  uh();
  const f=tasks.filter(t=>filter==="全て"||t.status===filter).sort((a,b)=>{
    if(sortBy==="due")return a.due.localeCompare(b.due);
    if(sortBy==="priority")return({高:0,中:1,低:2}[a.priority]||1)-({高:0,中:1,低:2}[b.priority]||1);
    return(b.effort||0)-(a.effort||0);
  });
  const el=document.getElementById("task-list");
  if(!f.length){el.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:8px">✓</div>タスクはありません</div>';return;}
  el.innerHTML=f.map(rc).join('');
}
function rc(t){
  const ed=editId===t.id;
  const ov=t.due<today&&t.status!=="完了";
  return `<div class="card ${t.status==='完了'?'done':''}" id="card-${t.id}" style="border-left:3px solid ${PC[t.priority]}">
    ${!ed?`<button class="edit-btn" onclick="startEdit(${t.id})">✏️ 編集</button>`:''}
    <div class="ctop">
      ${ed?`<input class="ctitle-input" id="et-${t.id}" value="${e(t.title)}">`:`<div class="ctitle ${t.status==='完了'?'done':''}">${t.sourceIcon||''} ${e(t.title)}</div>`}
      <span class="sbadge" style="background:${SBG[t.status]};color:${SC[t.status]};border:1px solid ${SC[t.status]}44">${t.status}</span>
    </div>
    ${ed?`<textarea class="cdetail-input" id="ed-${t.id}" rows="2">${e(t.detail||'')}</textarea>`:(t.detail?`<div class="cdetail">${e(t.detail)}</div>`:'')}
    ${ed?`
      <div class="erow">
        <select class="esel" id="es-${t.id}">${['未着手','進行中','完了'].map(s=>`<option ${s===t.status?'selected':''}>${s}</option>`).join('')}</select>
        <select class="esel" id="ep-${t.id}">${['高','中','低'].map(p=>`<option ${p===t.priority?'selected':''}>${p}</option>`).join('')}</select>
        <input class="einp" type="date" id="edu-${t.id}" value="${t.due}" style="width:120px">
        <input class="einp" type="number" id="ef-${t.id}" value="${t.effort||0}" min="0" step="0.5" placeholder="工数h" style="width:70px">
      </div>
      <div class="erow" style="margin-top:4px">
        <input class="einp" style="flex:1;width:100%" id="etag-${t.id}" value="${e((t.tags||[]).join(', '))}" placeholder="タグ（カンマ区切り）">
      </div>
      <div class="erow" style="margin-top:6px">
        <button class="btn-sv" onclick="sv(${t.id})">✓ 保存</button>
        <button class="btn-cl" onclick="ce()">キャンセル</button>
      </div>`
    :`<div class="cmeta">
        <span class="tag" style="background:${PBG[t.priority]};color:${PC[t.priority]};border:1px solid ${PC[t.priority]}33">▲ ${t.priority}</span>
        <span class="${ov?'mi-red':'mi'}">${ov?'⚠':'📅'} ${t.due}</span>
        <span class="mi">⏱ ${t.effort||0}h</span>
        <span class="mi">${e(t.source||'')}</span>
        ${(t.tags||[]).map(tag=>`<span class="tag tag-blue">#${e(tag)}</span>`).join('')}
      </div>`}
  </div>`;
}
function startEdit(id){editId=id;rt();}
function ce(){editId=null;rt();}
function sv(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  t.title=document.getElementById(`et-${id}`).value.trim()||t.title;
  t.detail=document.getElementById(`ed-${id}`).value.trim();
  t.status=document.getElementById(`es-${id}`).value;
  t.priority=document.getElementById(`ep-${id}`).value;
  t.due=document.getElementById(`edu-${id}`).value;
  t.effort=parseFloat(document.getElementById(`ef-${id}`).value)||0;
  t.tags=document.getElementById(`etag-${id}`).value.split(',').map(s=>s.trim()).filter(Boolean);
  editId=null;ra();sts(tasks);
}
function re(){
  const active=tasks.filter(t=>t.status!=="完了");
  const done=tasks.filter(t=>t.status==="完了");
  const ta=active.reduce((s,t)=>s+(t.effort||0),0);
  const td=done.reduce((s,t)=>s+(t.effort||0),0);
  const bp={高:0,中:0,低:0};active.forEach(t=>bp[t.priority]=(bp[t.priority]||0)+(t.effort||0));
  document.getElementById("effort-content").innerHTML=`
    <div class="esum">
      <div class="esum-title">📊 工数サマリー</div>
      <div class="egrid">
        <div class="eitem"><div class="enum" style="color:#2563eb">${ta}h</div><div class="elabel">残り工数</div></div>
        <div class="eitem"><div class="enum" style="color:#22c55e">${td}h</div><div class="elabel">完了済み</div></div>
        <div class="eitem"><div class="enum" style="color:#1e3a5f">${ta+td}h</div><div class="elabel">合計</div></div>
      </div>
    </div>
    <div class="esum">
      <div class="esum-title">🎯 優先度別 残り工数</div>
      <div class="egrid">
        <div class="eitem"><div class="enum" style="color:#ef4444">${bp['高']}h</div><div class="elabel">高優先度</div></div>
        <div class="eitem"><div class="enum" style="color:#f59e0b">${bp['中']}h</div><div class="elabel">中優先度</div></div>
        <div class="eitem"><div class="enum" style="color:#94a3b8">${bp['低']}h</div><div class="elabel">低優先度</div></div>
      </div>
    </div>
    <div class="esum">
      <div class="esum-title">📋 タスク別工数</div>
      ${tasks.filter(t=>(t.effort||0)>0).sort((a,b)=>(b.effort||0)-(a.effort||0)).map(t=>`
        <div class="erow-item">
          <div style="flex:1;font-size:12px;color:${t.status==='完了'?'#94a3b8':'#1e3a5f'};${t.status==='完了'?'text-decoration:line-through':''}">
            ${t.sourceIcon} ${e(t.title)}
          </div>
          <span style="font-size:11px;font-weight:700;color:${t.status==='完了'?'#22c55e':'#2563eb'};white-space:nowrap">${t.effort}h</span>
          <span class="tag" style="background:${SBG[t.status]};color:${SC[t.status]};border:1px solid ${SC[t.status]}33">${t.status}</span>
        </div>`).join('')}
    </div>`;
}

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showTab(tab){
  ['tasks','effort','chat'].forEach(id=>{
    const p=document.getElementById(id+'-panel');
    if(!p)return;
    if(id==='chat'){p.style.display='none';p.className=''}
    else{p.style.display='none';p.className=id+'-panel';}
    document.getElementById('tab-'+id).className='tab';
  });
  const ap=document.getElementById(tab+'-panel');
  if(tab==='chat'){ap.style.display='flex';ap.className='vis';}
  else{ap.style.display='block';ap.className=tab+'-panel vis';}
  document.getElementById('tab-'+tab).className='tab active';
  if(tab==='effort')re();
}
function setFilter(f){filter=f;['all','todo','wip','done'].forEach(k=>{const m={all:'全て',todo:'未着手',wip:'進行中',done:'完了'};document.getElementById('f-'+k).className='fbtn'+(m[k]===f?' active':'');});rt();}
function setSortBy(s){sortBy=s;['due','priority','effort'].forEach(k=>{document.getElementById('s'+k[0]).className='sbtn'+(k===s?' active':'');});rt();}
function addMsg(role,text){const el=document.getElementById('messages');const d=document.createElement('div');d.className='msg '+role;d.innerHTML=role==='assistant'?`<div class="mavatar">🦆</div><div class="mbubble">${e(text)}</div>`:`<div class="mbubble">${e(text)}</div>`;el.appendChild(d);el.scrollTop=el.scrollHeight;}
function sht(){const el=document.getElementById('messages');const d=document.createElement('div');d.className='msg assistant';d.id='typ';d.innerHTML=`<div class="mavatar">🦆</div><div class="mbubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;el.appendChild(d);el.scrollTop=el.scrollHeight;}
function hht(){document.getElementById('typ')?.remove();}
function si(t){const el=document.getElementById('ci');el.value=t;el.focus();oic();showTab('chat');}
function oic(){document.getElementById('sbtn').className='sndbtn'+(document.getElementById('ci').value.trim()?' on':'');}
function okd(ev){if(ev.key==='Enter'&&!ev.shiftKey&&!ev.isComposing){ev.preventDefault();send();}}
async function send(){
  const el=document.getElementById('ci');const txt=el.value.trim();if(!txt||loading)return;
  el.value='';oic();loading=true;addMsg('user',txt);sht();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SP,messages:[{role:'user',content:`Tasks:\n${JSON.stringify(tasks)}\n\nUser: ${txt}`}]})});
    const d=await r.json();const raw=d.content?.find(b=>b.type==='text')?.text||'{}';
    let p;try{p=JSON.parse(raw.replace(/```json\n?|```\n?/g,'').trim());}catch{p={message:'処理できませんでした。',updates:[],newTasks:[]};}
    if(p.updates?.length)tasks=tasks.map(t=>{const u=p.updates.find(u=>u.id===t.id);return u?{...t,[u.field]:u.field==='effort'?parseFloat(u.value)||0:u.value}:t;});
    if(p.newTasks?.length)tasks=[...tasks,...p.newTasks.map(nt=>({...nt,id:nextId++,effort:nt.effort||0}))];
    ra();hht();addMsg('assistant',p.message||'完了！');
    if(gToken&&(p.updates?.length||p.newTasks?.length))await sts(tasks);
    if(p.action!=='reply')setTimeout(()=>showTab('tasks'),900);
  }catch{hht();addMsg('assistant','エラーが発生しました。もう一度お試しください。');}
  loading=false;
}
</script>
</body>
