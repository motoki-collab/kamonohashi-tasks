<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かものはし タスクAI</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif; background: #08090d; color: #cbd5e1; min-height: 100vh; display: flex; justify-content: center; }
  #app { width: 100%; max-width: 480px; display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  header { background: linear-gradient(180deg,#0f1117 0%,#0b0e16 100%); padding: 16px 14px 12px; border-bottom: 1px solid #1a2035; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg,#2563eb,#7c3aed); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; box-shadow: 0 0 12px #2563eb44; }
  .logo-title { font-size: 13px; font-weight: 700; color: #f1f5f9; letter-spacing: 0.03em; }
  .logo-status { font-size: 10px; margin-top: 1px; }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .btn-login { padding: 6px 12px; border-radius: 8px; border: 1px solid #1a6b3a; background: #0a2a1a; color: #22c55e; font-size: 11px; cursor: pointer; font-weight: 600; }
  .btn-sheets { padding: 6px 12px; border-radius: 8px; border: 1px solid #1a6b3a; background: #0a2a1a; color: #22c55e; font-size: 11px; text-decoration: none; display: inline-block; }
  .btn-sort { padding: 4px 8px; border-radius: 6px; border: 1px solid #1a2035; background: transparent; color: #475569; font-size: 10px; cursor: pointer; }
  .btn-sort.active { border-color: #2563eb; background: #1e3a8a22; color: #60a5fa; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
  .stat-btn { border-radius: 10px; padding: 9px 4px; text-align: center; cursor: pointer; border: 1px solid; background: none; }
  .stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 10px; color: #64748b; margin-top: 3px; }

  /* Tabs */
  .tabs { display: flex; background: #0b0e16; border-bottom: 1px solid #1a2035; flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; background: transparent; border: none; border-bottom: 2px solid transparent; color: #475569; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .tab.active { background: #0f1117; border-bottom-color: #2563eb; color: #60a5fa; }

  /* Tasks */
  #tasks-panel { flex: 1; overflow: auto; padding: 10px 12px 80px; display: none; }
  #tasks-panel.visible { display: block; }
  .filters { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 11px; border-radius: 20px; border: 1px solid #1a2035; background: transparent; color: #64748b; font-size: 11px; cursor: pointer; font-family: inherit; }
  .filter-btn.active { border-color: #2563eb; background: #1e3a8a22; color: #60a5fa; }
  .task-card { background: #0f1117; border: 1px solid #1a2035; border-radius: 12px; padding: 12px 13px; margin-bottom: 8px; transition: opacity 0.2s; }
  .task-card.done { opacity: 0.5; }
  .task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .task-title { font-size: 13px; font-weight: 600; color: #e2e8f0; line-height: 1.4; flex: 1; }
  .task-title.done { text-decoration: line-through; }
  .task-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
  .task-detail { font-size: 11px; color: #475569; margin-bottom: 7px; line-height: 1.5; }
  .task-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; }
  .tag-blue { background: #1e3a8a22; color: #60a5fa; }
  .empty { text-align: center; color: #1e293b; padding: 48px 0; font-size: 14px; }

  /* Chat */
  #chat-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; height: calc(100vh - 160px); }
  #chat-panel.visible { display: flex; }
  .messages { flex: 1; overflow: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg-avatar { width: 28px; height: 28px; background: linear-gradient(135deg,#2563eb,#7c3aed); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-right: 8px; flex-shrink: 0; align-self: flex-end; box-shadow: 0 0 8px #2563eb44; }
  .msg-bubble { max-width: 80%; padding: 10px 14px; font-size: 13px; line-height: 1.65; white-space: pre-wrap; }
  .msg.user .msg-bubble { border-radius: 16px 16px 4px 16px; background: linear-gradient(135deg,#1d4ed8,#2563eb); color: #e2e8f0; }
  .msg.assistant .msg-bubble { border-radius: 16px 16px 16px 4px; background: #0f1117; color: #e2e8f0; border: 1px solid #1a2035; }
  .typing { display: flex; gap: 5px; padding: 10px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #2563eb; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  .quick-actions { padding: 8px 12px 4px; display: flex; gap: 6px; overflow-x: auto; border-top: 1px solid #1a2035; }
  .quick-btn { padding: 5px 10px; border-radius: 16px; border: 1px solid #1a2035; background: #0f1117; color: #3b82f6; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
  .input-area { padding: 8px 12px 20px; display: flex; gap: 8px; background: #08090d; }
  textarea { flex: 1; padding: 10px 13px; border-radius: 12px; border: 1px solid #1a2035; background: #0f1117; color: #e2e8f0; font-size: 13px; outline: none; font-family: inherit; resize: none; line-height: 1.5; }
  textarea::placeholder { color: #334155; }
  .send-btn { width: 44px; height: 44px; border-radius: 12px; align-self: flex-end; background: #0f1117; border: 1px solid #1a2035; color: #1e293b; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: default; }
  .send-btn.active { background: linear-gradient(135deg,#1d4ed8,#2563eb); border-color: #2563eb; color: #fff; cursor: pointer; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">🦆</div>
        <div>
          <div class="logo-title">かものはし タスクAI</div>
          <div class="logo-status" id="status-label" style="color:#475569">Sheets未接続</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-login" id="login-btn" onclick="connectSheets()">🔗 Googleログイン</button>
        <a class="btn-sheets" id="sheets-link" href="#" target="_blank" style="display:none">📊 Sheetsを開く</a>
        <button class="btn-sort active" id="sort-due" onclick="setSortBy('due')">期限</button>
        <button class="btn-sort" id="sort-priority" onclick="setSortBy('priority')">優先度</button>
      </div>
    </div>
    <div class="stats">
      <button class="stat-btn" onclick="setFilter('未着手')" style="border-color:#64748b33;background:#1e293b22" id="stat-todo">
        <div class="stat-num" style="color:#64748b" id="count-todo">0</div>
        <div class="stat-label">未着手</div>
      </button>
      <button class="stat-btn" onclick="setFilter('進行中')" style="border-color:#f59e0b33;background:#29200044" id="stat-wip">
        <div class="stat-num" style="color:#f59e0b" id="count-wip">0</div>
        <div class="stat-label">進行中</div>
      </button>
      <button class="stat-btn" onclick="setFilter('完了')" style="border-color:#22c55e33;background:#022c1444" id="stat-done">
        <div class="stat-num" style="color:#22c55e" id="count-done">0</div>
        <div class="stat-label">完了</div>
      </button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tab-tasks" onclick="showTab('tasks')">📋 タスク</button>
    <button class="tab" id="tab-chat" onclick="showTab('chat')">🤖 AI更新</button>
  </div>

  <div id="tasks-panel" class="visible">
    <div class="filters">
      <button class="filter-btn active" id="f-all" onclick="setFilter('全て')">全て</button>
      <button class="filter-btn" id="f-todo" onclick="setFilter('未着手')">未着手</button>
      <button class="filter-btn" id="f-wip" onclick="setFilter('進行中')">進行中</button>
      <button class="filter-btn" id="f-done" onclick="setFilter('完了')">完了</button>
    </div>
    <div id="task-list"></div>
  </div>

  <div id="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="quick-actions">
      <button class="quick-btn" onclick="setInput('JT竹中面談準備完了')">JT面談完了</button>
      <button class="quick-btn" onclick="setInput('AIチーム業務実装着手')">AI業務着手</button>
      <button class="quick-btn" onclick="setInput('法人寄付フィードバック完了')">寄付件完了</button>
      <button class="quick-btn" onclick="setInput('Zoomメモから抽出して：\n')">Zoomメモ→</button>
    </div>
    <div class="input-area">
      <textarea id="chat-input" rows="2" placeholder="「〇〇完了」「追加：〇〇」「Zoomメモから抽出して：…」" oninput="onInputChange()" onkeydown="onKeyDown(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = "432840603328-ttapfb1bqoabbp5ql8orkifa3jhimfpr.apps.googleusercontent.com";
const SPREADSHEET_ID = "1GXiC1IvMjxnO2iog5ETu6xb3Ek9jto95tVr4JSF1mqA";
const SHEET_NAME = "tasks";
const HEADERS = ["id","title","detail","source","sourceIcon","priority","status","due","tags"];

const SYSTEM_PROMPT = `You are a task management assistant for Keisuke Motoki at かものはしプロジェクト.
Return ONLY a JSON object (no markdown):
{"action":"update_status"|"add_task"|"extract_tasks"|"update_priority"|"update_due"|"reply","message":"Japanese response","updates":[{"id":number,"field":"status"|"priority"|"due"|"title","value":string}],"newTasks":[{"title":string,"detail":string,"source":string,"sourceIcon":"📧"|"💬"|"📹","priority":"高"|"中"|"低","status":"未着手","due":"YYYY-MM-DD","tags":[string]}]}
Rules: 〇〇完了/終わった→status=完了, 〇〇着手/始めた→status=進行中, 追加：〇〇→add_task, Zoom/議事録テキスト→extract_tasks全アクション抽出, 優先度を〇〇に→update_priority, 期限を〇〇に→update_due(4月10日→2026-04-10). タイトル部分一致で検索. 返答は日本語.`;

let tasks = [
  {id:1,title:"JT竹中さんとのTeams面談準備",detail:"4/14(火) 14:15〜 Teams。近況共有・かものはし活動紹介。",source:"Gmail",sourceIcon:"📧",priority:"高",status:"未着手",due:"2026-04-14",tags:["外部連携","JT"]},
  {id:2,title:"「紛争に関する勉強 番外編」Zoom参加",detail:"4/14(火) 14:00〜 坂上さん主催。藤村さんも参加予定。",source:"Gmail",sourceIcon:"📧",priority:"中",status:"未着手",due:"2026-04-14",tags:["勉強会","紛争"]},
  {id:3,title:"Global survey相談 フォローアップ",detail:"五井渕さんと3/27にMTG実施済み。次のアクション確認が必要。",source:"Gmail",sourceIcon:"📧",priority:"中",status:"進行中",due:"2026-04-05",tags:["調査","グローバル"]},
  {id:4,title:"ジャーナリスト情報提供件の方針確認",detail:"稲川さん・曽根原さんCc。警察庁との連携方針を組織として決定する必要あり。",source:"Gmail",sourceIcon:"📧",priority:"高",status:"進行中",due:"2026-04-02",tags:["対外連携","警察庁"]},
  {id:5,title:"AIチーム：業務実装方針レビュー＆フィードバック",detail:"小俣さんより依頼。AI最新情報キャッチアップ→業務実装検討。期日4/17。",source:"Slack #特命AIチーム",sourceIcon:"💬",priority:"高",status:"未着手",due:"2026-04-17",tags:["AI活用","組織"]},
  {id:6,title:"法人寄付・使途指定の提案内容フィードバック",detail:"青山さんより。横浜ゴム60万円寄付案件。各事業部パターンで提案作成中。",source:"Slack #組織横断ファンドレイジング",sourceIcon:"💬",priority:"高",status:"未着手",due:"2026-04-17",tags:["ファンドレイジング","寄付"]},
  {id:7,title:"HS参加者候補への声がけ協力",detail:"三代さんより。今週から主催団体各自で積極的な声がけ実施中。",source:"Slack #hs-global関連",sourceIcon:"💬",priority:"中",status:"未着手",due:"2026-04-03",tags:["HS","国際"]},
  {id:8,title:"英語発音レッスン受講（ストアカ）",detail:"3/29(日) 21:00〜 井上陽子さん。3/30(月) 20:00〜 別レッスン予約済み。",source:"Gmail",sourceIcon:"📧",priority:"低",status:"完了",due:"2026-03-30",tags:["英語","自己研鑽"]},
];

let gToken = null;
let sheetsStatus = "disconnected";
let sortBy = "due";
let filter = "全て";
let nextId = tasks.length + 1;
let loading = false;
let tokenClient = null;

const SC = {"未着手":"#64748b","進行中":"#f59e0b","完了":"#22c55e"};
const PC = {"高":"#f87171","中":"#fbbf24","低":"#94a3b8"};
const today = new Date().toISOString().split("T")[0];

// Init Google Identity
window.addEventListener('load', () => {
  if (window.google) initGoogle();
  else document.querySelector('script[src*="gsi"]').addEventListener('load', initGoogle);
  addMsg("assistant", "こんにちは、恵介さん！\n\n上の「🔗 Googleログイン」ボタンを押すとGoogle Sheetsと接続できます。\nログイン後はタスクの更新が自動的にSheetsに保存されます！");
  renderTasks();
});

function initGoogle() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: "https://www.googleapis.com/auth/spreadsheets",
    callback: async (resp) => {
      if (resp.error) { setStatus("error","⚠ エラー"); addMsg("assistant","⚠️ Googleログインに失敗しました。もう一度お試しください。"); return; }
      gToken = resp.access_token;
      setStatus("synced","✓ 接続済み");
      document.getElementById("login-btn").style.display = "none";
      document.getElementById("sheets-link").style.display = "inline-block";
      document.getElementById("sheets-link").href = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}`;
      await loadFromSheets();
    }
  });
}

function connectSheets() { tokenClient?.requestAccessToken(); }

function setStatus(s, label) {
  sheetsStatus = s;
  const el = document.getElementById("status-label");
  el.textContent = label;
  el.style.color = {disconnected:"#475569",connecting:"#f59e0b",synced:"#22c55e",error:"#f87171"}[s];
}

async function loadFromSheets() {
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A1:I1`, {headers:{Authorization:`Bearer ${gToken}`}});
    const hdr = await res.json();
    if (!hdr.values || hdr.values[0]?.[0] !== "id") {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A1:I1?valueInputOption=RAW`, {
        method:"PUT", headers:{Authorization:`Bearer ${gToken}`,"Content-Type":"application/json"},
        body: JSON.stringify({values:[HEADERS]})
      });
    }
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:I1000`, {headers:{Authorization:`Bearer ${gToken}`}});
    const data = await r.json();
    if (data.values && data.values.length > 0) {
      const loaded = data.values.map(row => {
        if (!row || row.length < 8) return null;
        try { return {id:parseInt(row[0]),title:row[1]||"",detail:row[2]||"",source:row[3]||"",sourceIcon:row[4]||"📋",priority:row[5]||"中",status:row[6]||"未着手",due:row[7]||"",tags:row[8]?JSON.parse(row[8]):[]}; }
        catch { return null; }
      }).filter(Boolean);
      if (loaded.length > 0) { tasks = loaded; nextId = Math.max(...tasks.map(t=>t.id))+1; renderTasks(); addMsg("assistant",`✅ Google Sheetsから${loaded.length}件を読み込みました！\nタスクの更新は自動でSheetsに保存されます。`); return; }
    }
    await saveToSheets(tasks);
    addMsg("assistant",`✅ Google Sheetsに${tasks.length}件を保存しました！\nタスクの更新は自動でSheetsに保存されます。`);
  } catch(e) { setStatus("error","⚠ エラー"); addMsg("assistant","⚠️ Sheets接続エラー: "+e.message); }
}

async function saveToSheets(taskList) {
  setStatus("connecting","同期中...");
  try {
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:I1000:clear`, {method:"POST",headers:{Authorization:`Bearer ${gToken}`}});
    if (!taskList.length) { setStatus("synced","✓ 同期済み"); return; }
    const rows = taskList.map(t=>[t.id,t.title,t.detail||"",t.source||"",t.sourceIcon||"📋",t.priority||"中",t.status||"未着手",t.due||"",JSON.stringify(t.tags||[])]);
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:I${rows.length+1}?valueInputOption=RAW`, {
      method:"PUT", headers:{Authorization:`Bearer ${gToken}`,"Content-Type":"application/json"},
      body: JSON.stringify({values:rows})
    });
    const t = new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    setStatus("synced",`✓ 同期済み ${t}`);
  } catch { setStatus("error","⚠ 同期エラー"); }
}

function renderTasks() {
  const counts = {未着手:0,進行中:0,完了:0};
  tasks.forEach(t => counts[t.status] = (counts[t.status]||0)+1);
  document.getElementById("count-todo").textContent = counts["未着手"]||0;
  document.getElementById("count-wip").textContent = counts["進行中"]||0;
  document.getElementById("count-done").textContent = counts["完了"]||0;

  const filtered = tasks.filter(t => filter==="全て" || t.status===filter)
    .sort((a,b) => sortBy==="due" ? a.due.localeCompare(b.due) : ({高:0,中:1,低:2}[a.priority]||1)-({高:0,中:1,低:2}[b.priority]||1));

  const list = document.getElementById("task-list");
  if (!filtered.length) { list.innerHTML = '<div class="empty"><div style="font-size:36px;margin-bottom:8px">✓</div>タスクはありません</div>'; return; }

  list.innerHTML = filtered.map(t => `
    <div class="task-card ${t.status==='完了'?'done':''}" style="border-left:3px solid ${PC[t.priority]||'#64748b'}">
      <div class="task-top">
        <div class="task-title ${t.status==='完了'?'done':''}">${t.sourceIcon||''} ${esc(t.title)}</div>
        <span class="task-status" style="background:${SC[t.status]||'#64748b'}1a;color:${SC[t.status]||'#64748b'};border:1px solid ${SC[t.status]||'#64748b'}44">${t.status}</span>
      </div>
      ${t.detail?`<div class="task-detail">${esc(t.detail)}</div>`:''}
      <div class="task-meta">
        <span class="tag" style="background:${PC[t.priority]}1a;color:${PC[t.priority]};border:1px solid ${PC[t.priority]}33">▲ ${t.priority}</span>
        <span style="font-size:10px;color:${t.due<today&&t.status!=='完了'?'#f87171':'#475569'};font-weight:${t.due<today&&t.status!=='完了'?'600':'400'}">${t.due<today&&t.status!=='完了'?'⚠ ':'📅 '}${t.due}</span>
        <span style="font-size:10px;color:#334155">${esc(t.source||'')}</span>
        ${(t.tags||[]).map(tag=>`<span class="tag tag-blue">#${esc(tag)}</span>`).join('')}
      </div>
    </div>`).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTab(tab) {
  document.getElementById('tasks-panel').className = tab==='tasks'?'visible':'';
  document.getElementById('chat-panel').className = tab==='chat'?'visible':'';
  document.getElementById('tab-tasks').className = tab==='tasks'?'tab active':'tab';
  document.getElementById('tab-chat').className = tab==='chat'?'tab active':'tab';
}

function setFilter(f) {
  filter = f;
  ['all','todo','wip','done'].forEach(k => {
    const map={all:'全て',todo:'未着手',wip:'進行中',done:'完了'};
    document.getElementById('f-'+k).className = 'filter-btn'+(map[k]===f?' active':'');
  });
  renderTasks();
}

function setSortBy(s) {
  sortBy = s;
  document.getElementById('sort-due').className = 'btn-sort'+(s==='due'?' active':'');
  document.getElementById('sort-priority').className = 'btn-sort'+(s==='priority'?' active':'');
  renderTasks();
}

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg '+role;
  div.innerHTML = role==='assistant'
    ? `<div class="msg-avatar">🦆</div><div class="msg-bubble">${esc(text)}</div>`
    : `<div class="msg-bubble">${esc(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🦆</div><div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function setInput(text) {
  const el = document.getElementById('chat-input');
  el.value = text; el.focus(); onInputChange();
  showTab('chat');
}

function onInputChange() {
  const btn = document.getElementById('send-btn');
  btn.className = document.getElementById('chat-input').value.trim() ? 'send-btn active' : 'send-btn';
}

function onKeyDown(e) {
  if (e.key==='Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const el = document.getElementById('chat-input');
  const text = el.value.trim();
  if (!text || loading) return;
  el.value = ''; onInputChange(); loading = true;
  addMsg('user', text); showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:[{role:'user',content:`Tasks:\n${JSON.stringify(tasks)}\n\nUser: ${text}`}]})
    });
    const data = await res.json();
    const raw = data.content?.find(b=>b.type==='text')?.text||'{}';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json\n?|```\n?/g,'').trim()); }
    catch { parsed = {message:'処理できませんでした。もう一度お試しください。',updates:[],newTasks:[]}; }

    if (parsed.updates?.length) tasks = tasks.map(t=>{ const u=parsed.updates.find(u=>u.id===t.id); return u?{...t,[u.field]:u.value}:t; });
    if (parsed.newTasks?.length) tasks = [...tasks, ...parsed.newTasks.map(nt=>({...nt,id:nextId++}))];
    renderTasks();
    hideTyping(); addMsg('assistant', parsed.message||'完了！');

    if (gToken && (parsed.updates?.length || parsed.newTasks?.length)) await saveToSheets(tasks);
    if (parsed.action !== 'reply') setTimeout(()=>showTab('tasks'), 900);
  } catch { hideTyping(); addMsg('assistant','エラーが発生しました。もう一度お試しください。'); }
  loading = false;
}
</script>
</body>
